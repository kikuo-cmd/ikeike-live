<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Live Stream - Final Push</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 98vh; }
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align:center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        #main-content { display: none; flex-direction: column; height: 100%; gap: 10px; }
        #video-container { flex: 1; background: #000; position: relative; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        video { width: 100%; height: 100%; object-fit: contain; }
        #chat-section { height: 200px; display: flex; flex-direction: column; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; background: #f9f9f9; }
        .status-badge { position: absolute; top: 15px; left: 15px; color: #fff; background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 20px; font-size: 12px; z-index: 10; font-weight: bold; }
        button { cursor: pointer; padding: 12px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-viewer { background: #28a745; margin-top: 10px; width: 100%; }
        #load-video-btn { position: absolute; z-index: 20; background: #ff4757; display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h2 style="margin-top:0">Live Stream</h2>
        <input type="password" id="pass-input" placeholder="パスワード(管理者の場合)">
        <input type="text" id="room-id-input" placeholder="配信ID (例: abc1234)">
        <p style="font-size:12px; color:#999;">※IDは配信者と視聴者で同じものを入力</p>
        <button onclick="start('admin')" style="width:100%">配信者として開始</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <button onclick="start('viewer')" class="btn-viewer">視聴者として参加</button>
    </div>
</div>

<div id="main-content">
    <div id="video-container">
        <div id="status" class="status-badge">スタンバイ中</div>
        <button id="load-video-btn" onclick="manualPlay()">映像を読み込む</button>
        <video id="video-display" autoplay playsinline muted></video>
    </div>

    <div id="chat-section">
        <div id="chat-box"></div>
        <div style="display:flex; padding:8px; gap:5px; background:#fff;">
            <input type="text" id="chat-input" style="flex:1; margin:0;" placeholder="メッセージを入力...">
            <button id="send-btn" style="padding:0 20px;">送信</button>
        </div>
    </div>

    <div id="admin-controls" style="display:none; padding:10px; background:#fff; border-radius:12px; display:flex; gap:10px;">
        <button onclick="toggleMic()" id="mic-btn" style="background:#57606f">マイク: ON</button>
        <button onclick="location.reload()" style="background:#ff4757; margin-left:auto;">終了</button>
    </div>
</div>

<script>
    const ADMIN_PASS = "pass"; 
    const PEER_CONFIG = {
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
    };

    let peer, conn, currentStream, targetID;
    const statusEl = document.getElementById('status');
    const videoEl = document.getElementById('video-display');
    const loadBtn = document.getElementById('load-video-btn');

    async function start(mode) {
        targetID = document.getElementById('room-id-input').value.trim();
        if (!targetID) return alert("IDを入力してください");

        if (mode === 'admin') {
            if (document.getElementById('pass-input').value !== ADMIN_PASS) return alert("パスワードが違います");
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('admin-controls').style.display = 'flex';
            setupAdmin();
        } else {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            setupViewer();
        }
    }

    // --- 管理者 ---
    async function setupAdmin() {
        try {
            currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            videoEl.srcObject = currentStream;
            
            peer = new Peer(targetID, PEER_CONFIG);
            peer.on('open', id => statusEl.innerText = "配信中 - ID: " + id);
            peer.on('call', call => {
                statusEl.innerText = "視聴者が来ました！映像を送信中...";
                call.answer(currentStream);
            });
            peer.on('connection', c => {
                conn = c;
                conn.on('data', data => appendChat(data.user, data.msg));
                appendChat("システム", "視聴者がチャットに参加しました");
            });
            peer.on('error', err => {
                if(err.type === 'unavailable-id') alert("そのIDは使用中です。別のIDにしてください。");
                location.reload();
            });
        } catch (e) {
            alert("画面共有が許可されませんでした。");
            location.reload();
        }
    }

    // --- 視聴者 ---
    function setupViewer() {
        peer = new Peer(PEER_CONFIG);
        peer.on('open', () => {
            statusEl.innerText = "配信を探しています: " + targetID;
            
            // チャット接続
            conn = peer.connect(targetID);
            conn.on('open', () => {
                appendChat("システム", "配信者に接続しました。まもなく映像が流れます。");
                
                // 映像リクエスト
                const call = peer.call(targetID, new MediaStream());
                call.on('stream', stream => {
                    statusEl.innerText = "映像信号を受信！";
                    videoEl.srcObject = stream;
                    videoEl.muted = false; // 視聴側は音を出す
                    
                    // 自動再生に失敗した場合にボタンを出す
                    const playPromise = videoEl.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            statusEl.innerText = "再生がブロックされました";
                            loadBtn.style.display = 'block'; // ボタン表示
                        });
                    }
                });
            });
        });
        
        peer.on('error', () => {
            statusEl.innerText = "接続エラー。IDが正しいか、配信が開始されているか確認してください。";
        });
    }

    function manualPlay() {
        videoEl.play();
        loadBtn.style.display = 'none';
        statusEl.innerText = "ライブ視聴中";
    }

    function appendChat(user, msg) {
        const div = document.createElement('div');
        div.style.marginBottom = "5px";
        div.innerHTML = `<b style="color:#007bff">${user}:</b> ${msg}`;
        const box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('send-btn').onclick = () => {
        const msg = document.getElementById('chat-input').value;
        if (!msg || !conn) return;
        conn.send({ user: currentStream ? "管理者" : "視聴者", msg: msg });
        appendChat("自分", msg);
        document.getElementById('chat-input').value = "";
    };

    function toggleMic() {
        const audio = currentStream.getAudioTracks()[0];
        if (audio) {
            audio.enabled = !audio.enabled;
            document.getElementById('mic-btn').innerText = `マイク: ${audio.enabled ? "ON" : "OFF"}`;
        }
    }
</script>
</body>
</html>
