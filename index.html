<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Live Stream - Sync Fixed</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 98vh; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        #main-content { display: none; flex-direction: column; height: 100%; }
        #video-container { flex: 1; background: #000; position: relative; border-radius: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #chat-section { height: 180px; display: flex; flex-direction: column; background: #fff; margin-top: 10px; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; }
        .status-badge { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 15px; font-size: 11px; z-index: 10; }
        button { cursor: pointer; padding: 12px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; }
        #load-btn { position: absolute; z-index: 20; background: #ff4757; display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h3>Live App</h3>
        <input type="password" id="pass-input" placeholder="パスワード(管理者)">
        <input type="text" id="room-id-input" placeholder="配信ID(例: room123)">
        <button onclick="start('admin')" style="width:100%">管理者として開始</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <button onclick="start('viewer')" style="background:#28a745; width:100%">視聴者として参加</button>
    </div>
</div>

<div id="main-content">
    <div id="video-container">
        <div id="status" class="status-badge">準備中...</div>
        <button id="load-btn" onclick="manualPlay()">▶ 映像を表示する</button>
        <video id="video-display" autoplay playsinline></video>
    </div>
    <div id="chat-section">
        <div id="chat-box"></div>
        <div style="display:flex; padding:5px; gap:5px;">
            <input type="text" id="chat-input" style="flex:1; margin:0;" placeholder="メッセージ...">
            <button id="send-btn">送信</button>
        </div>
    </div>
    <div id="admin-controls" style="display:none; padding:10px; background:#fff; margin-top:5px; border-radius:12px;">
        <button onclick="toggleMic()" id="mic-btn">マイク: ON</button>
    </div>
</div>

<script>
    const ADMIN_PASS = "pass"; 
    // 通信を安定させるためのサーバー設定
    const CONFIG = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } };

    let peer, conn, currentStream, targetID;
    const statusEl = document.getElementById('status');
    const videoEl = document.getElementById('video-display');

    async function start(mode) {
        targetID = document.getElementById('room-id-input').value.trim();
        if (!targetID) return alert("IDを入力してください");

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';

        if (mode === 'admin') {
            if (document.getElementById('pass-input').value !== ADMIN_PASS) return location.reload();
            document.getElementById('admin-controls').style.display = 'block';
            setupAdmin();
        } else {
            setupViewer();
        }
    }

    function setupAdmin() {
        navigator.mediaDevices.getDisplayMedia({ video: true, audio: true }).then(stream => {
            currentStream = stream;
            videoEl.srcObject = stream;
            videoEl.muted = true;

            // 管理者は指定したIDで待機
            peer = new Peer(targetID, CONFIG);
            peer.on('open', id => statusEl.innerText = "配信中 - ID: " + id);
            
            // 重要：視聴者からの「映像ください」というリクエスト（call）を待つ
            peer.on('call', call => {
                appendChat("システム", "映像を送信します...");
                call.answer(currentStream);
            });

            peer.on('connection', c => {
                conn = c;
                conn.on('data', data => appendChat(data.user, data.msg));
            });
        }).catch(() => { alert("共有エラー"); location.reload(); });
    }

    function setupViewer() {
        // 視聴者はランダムなIDで作成し、管理者に繋ぎにいく
        peer = new Peer(CONFIG);
        peer.on('open', () => {
            statusEl.innerText = "接続中...";
            
            // 1. チャットを繋ぐ
            conn = peer.connect(targetID);
            conn.on('open', () => {
                appendChat("システム", "配信者に繋がりました。");
                
                // 2. 映像を「自分から」リクエストする（ここがポイント）
                const call = peer.call(targetID, new MediaStream());
                call.on('stream', stream => {
                    statusEl.innerText = "信号受信！ボタンを押してください";
                    videoEl.srcObject = stream;
                    document.getElementById('load-btn').style.display = 'block';
                });
            });
        });
        peer.on('error', (e) => {
            console.error(e);
            statusEl.innerText = "エラー: 配信が見つかりません。IDを確認してください。";
        });
    }

    function manualPlay() {
        videoEl.play();
        document.getElementById('load-btn').style.display = 'none';
        statusEl.innerText = "ライブ視聴中";
    }

    function appendChat(user, msg) {
        const div = document.createElement('div');
        div.innerHTML = `<b>${user}:</b> ${msg}`;
        const box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('send-btn').onclick = () => {
        const msg = document.getElementById('chat-input').value;
        if (!msg || !conn) return;
        conn.send({ user: currentStream ? "管理者" : "視聴者", msg: msg });
        appendChat("自分", msg);
        document.getElementById('chat-input').value = "";
    };

    function toggleMic() {
        const audio = currentStream.getAudioTracks()[0];
        if (audio) {
            audio.enabled = !audio.enabled;
            document.getElementById('mic-btn').innerText = `マイク: ${audio.enabled ? "ON" : "OFF"}`;
        }
    }
</script>
</body>
</html>
