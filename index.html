<!DOCTYPE html>
<html>
<head>
    <title>Agora Quick Start</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        #video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #000; height: 400px; }
        .player { width: 100%; height: 100%; background: #222; border: 1px solid #444; }
        .controls { padding: 20px; background: #f0f0f0; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="controls">
    <input type="text" id="appid" placeholder="Agora App ID">
    <input type="text" id="channel" placeholder="Channel Name" value="test">
    <button onclick="startLive('host')">配信開始</button>
    <button onclick="startLive('audience')">視聴開始</button>
</div>

<div id="video-grid">
    <div id="local-player" class="player"></div>
    <div id="remote-player" class="player"></div>
</div>

<script>
    let client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
    let localTracks = { videoTrack: null, audioTrack: null };

    async function startLive(role) {
        const appid = document.getElementById('appid').value;
        const channel = document.getElementById('channel').value;

        // 1. ロールの設定（最重要）
        await client.setClientRole(role);
        
        // 2. チャンネルに参加
        await client.join(appid, channel, null, null);

        if (role === 'host') {
            // 3. 画面共有の開始
            localTracks.videoTrack = await AgoraRTC.createScreenVideoTrack();
            // 4. 自分の画面に表示（IDを指定）
            localTracks.videoTrack.play("local-player");
            // 5. 配信開始
            await client.publish(Object.values(localTracks));
            console.log("配信がスタートしました");
        } else {
            // 視聴者の処理：相手が配信を始めたら自動で再生
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "video") {
                    // ID「remote-player」の中に映す
                    user.videoTrack.play("remote-player");
                }
                if (mediaType === "audio") { user.audioTrack.play(); }
            });
            console.log("配信を待っています。画面を一度クリックしてください。");
        }
    }
</script>
</body>
</html>
