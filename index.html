<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Live - Rebuild</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: #fff; text-align: center; }
        .setup { padding: 50px 20px; background: #222; }
        input { padding: 12px; border-radius: 5px; border: none; width: 200px; margin-bottom: 10px; }
        button { padding: 12px 24px; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; }
        #video-area { width: 100vw; height: 70vh; display: flex; align-items: center; justify-content: center; background: #111; }
        video { max-width: 100%; max-height: 100%; border: 1px solid #333; }
        #log { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 12px; padding: 10px; text-align: left; height: 80px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="setup" id="setup-panel">
    <h2>Live App Rebuild</h2>
    <input type="text" id="room-id" placeholder="配信IDを入力"><br>
    <button onclick="startHost()">配信を始める</button>
    <button onclick="startViewer()" style="background:#28a745;">視聴する</button>
</div>

<div id="video-area">
    <video id="main-video" autoplay playsinline></video>
</div>

<div id="log">ログ: 準備完了</div>

<script>
    const videoEl = document.getElementById('main-video');
    const logEl = document.getElementById('log');
    let peer;

    function writeLog(msg) {
        logEl.innerHTML += `<br>> ${msg}`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    // --- 配信者（ホスト）の処理 ---
    async function startHost() {
        const id = document.getElementById('room-id').value;
        if(!id) return alert("IDを入れてね");
        
        writeLog("画面共有を起動中...");
        try {
            // ここでブラウザの画面共有を呼び出す
            const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            videoEl.srcObject = stream;
            videoEl.muted = true;

            peer = new Peer(id);
            peer.on('open', () => {
                writeLog(`配信開始！ ID: ${id}`);
                document.getElementById('setup-panel').style.display = 'none';
            });

            // 視聴者が繋いできたら映像を返す
            peer.on('call', (call) => {
                writeLog("視聴者が接続しました。映像を送ります。");
                call.answer(stream);
            });
        } catch (err) {
            writeLog("エラー: 画面共有がキャンセルされたか、失敗しました。");
        }
    }

    // --- 視聴者の処理 ---
    function startViewer() {
        const id = document.getElementById('room-id').value;
        if(!id) return alert("IDを入れてね");

        peer = new Peer(); // 視聴者はランダムID
        peer.on('open', () => {
            writeLog(`サーバー接続完了。${id} を探しています...`);
            document.getElementById('setup-panel').style.display = 'none';

            // 配信者を呼び出す
            const call = peer.call(id, new MediaStream());
            call.on('stream', (remoteStream) => {
                writeLog("映像を受信しました！");
                videoEl.srcObject = remoteStream;
                videoEl.play();
            });
        });

        peer.on('error', (err) => writeLog(`エラー: ${err.type}`));
    }
</script>
</body>
</html>
