<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Next-Gen Video Stream</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; text-align: center; }
        #video-container { width: 100%; max-width: 800px; height: 450px; background: #000; margin: 20px auto; border-radius: 12px; overflow: hidden; position: relative; }
        #local-player, #remote-player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .controls { background: #333; padding: 20px; border-radius: 12px; display: inline-block; }
        input { padding: 10px; border-radius: 5px; border: none; margin: 5px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        #status { color: #00ff00; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Next-Gen Streaming</h2>

    <div class="controls">
        <input type="text" id="appid" placeholder="7eedc2063f254ddb9bc8988437cdcc48">
        <input type="text" id="channel" placeholder="チャンネル名 (例: test)">
        <br>
        <button onclick="join('host')">配信者として開始</button>
        <button onclick="join('audience')" style="background:#28a745;">視聴者として参加</button>
        <button onclick="leave()" style="background:#dc3545;">終了</button>
    </div>

    <div id="status">待機中...</div>

    <div id="video-container">
        <div id="remote-player"></div> <div id="local-player"></div>  </div>

<script>
    let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    let localTracks = { videoTrack: null, audioTrack: null };

    async function join(role) {
        const appId = document.getElementById("appid").value;
        const channel = document.getElementById("channel").value;
        if (!appId || !channel) return alert("App IDとチャンネル名を入力してください");

        document.getElementById("status").innerText = "接続中...";

        // チャンネルに参加
        await client.join(appId, channel, null, null);

        if (role === 'host') {
            // 配信者の設定：画面共有（またはカメラ）を開始
            // ※カメラにする場合は createCameraVideoTrack に書き換え
            localTracks.videoTrack = await AgoraRTC.createScreenVideoTrack();
            localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            
            // 自分の画面に表示
            localTracks.videoTrack.play("local-player");
            
            // 世界に向けて配信（パブリッシュ）
            await client.publish(Object.values(localTracks));
            document.getElementById("status").innerText = "配信中！視聴者は同じIDとチャンネル名で入ってください";
        } else {
            // 視聴者の設定：相手が配信を始めたら自動で再生する
            client.on("user-published", async (user, mediaType) => {
                await client.subscribe(user, mediaType);
                if (mediaType === "video") {
                    user.videoTrack.play("remote-player");
                    document.getElementById("status").innerText = "ライブ視聴中！";
                }
                if (mediaType === "audio") {
                    user.audioTrack.play();
                }
            });
            document.getElementById("status").innerText = "配信を待っています...";
        }
    }

    async function leave() {
        for (trackName in localTracks) {
            var track = localTracks[trackName];
            if (track) {
                track.stop();
                track.close();
                localTracks[trackName] = null;
            }
        }
        await client.leave();
        document.getElementById("status").innerText = "終了しました";
        location.reload();
    }
</script>
</body>
</html>
