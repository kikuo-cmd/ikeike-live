<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chromebook Stable Live</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.18.0.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        #video-view { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; margin-bottom: 20px; overflow: hidden; position: relative; border: 2px solid #334155; }
        #local-v, #remote-v { width: 100%; height: 100%; }
        /* ボタンを大きく、押しやすく変更 */
        .btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn-host { background: #3b82f6; color: white; }
        .btn-viewer { background: #10b981; color: white; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #475569; background: #1e293b; color: white; box-sizing: border-box; }
        #status { font-size: 14px; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="video-view">
        <div id="local-v"></div>
        <div id="remote-v"></div>
    </div>

    <input type="text" id="appid" placeholder="Agora App ID">
    <input type="text" id="channel" placeholder="ルーム名" value="test-room">
    
    <button id="host-btn" class="btn btn-host">🎥 配信を開始する</button>
    <button id="viewer-btn" class="btn btn-viewer">👀 視聴を開始する</button>
    
    <div id="status">待機中</div>
</div>

<script>
    const client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
    let remoteUser = null;

    // ボタン要素を取得
    const hostBtn = document.getElementById('host-btn');
    const viewerBtn = document.getElementById('viewer-btn');
    const status = document.getElementById('status');

    // Chromebookでも確実に反応するクリックイベントの書き方
    hostBtn.addEventListener('click', () => start('host'));
    viewerBtn.addEventListener('click', () => start('audience'));

    async function start(role) {
        const appid = document.getElementById('appid').value.trim();
        const channel = document.getElementById('channel').value.trim();
        if (!appid) return alert("App IDを入力してください");

        // Chromebookのブラウザに「これから音を出すよ」と伝える
        AgoraRTC.setLogLevel(1); 
        
        try {
            await client.setClientRole(role);
            await client.join(appid, channel, null, null);
            status.innerText = "接続成功！役割: " + role;

            if (role === 'host') {
                const videoTrack = await AgoraRTC.createScreenVideoTrack();
                const audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                videoTrack.play("local-v");
                await client.publish([videoTrack, audioTrack]);
                status.innerText = "🔴 配信中";
            } else {
                status.innerText = "配信を探しています...";
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        status.innerText = "受信中...（映像が出ない場合はここをクリック）";
                        user.videoTrack.play("remote-v");
                    }
                    if (mediaType === "audio") user.audioTrack.play();
                });
            }
        } catch (e) {
            status.innerText = "エラー: " + e.message;
        }
    }
</script>
</body>
</html>
