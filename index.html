<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Live App - Final Stability</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 98vh; }
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        #main-content { display: none; flex-direction: column; height: 100%; }
        #video-container { flex: 1; background: #000; position: relative; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #status-log { padding: 10px; background: #222; color: #0f0; font-family: monospace; font-size: 11px; height: 80px; overflow-y: auto; border-radius: 8px; margin-top: 5px; }
        button { cursor: pointer; padding: 10px; border-radius: 8px; border: none; background: #007bff; color: white; font-weight: bold; }
        #load-btn { position: absolute; z-index: 20; background: #ff4757; display: none; padding: 15px; border-radius: 30px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h3>Live App Stability</h3>
        <input type="password" id="pass-input" placeholder="パスワード(管理者の場合)">
        <input type="text" id="room-id-input" placeholder="配信ID (英数字)">
        <button onclick="start('admin')" style="width:100%">配信を開始する</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <button onclick="start('viewer')" style="background:#28a745; width:100%">視聴として参加</button>
    </div>
</div>

<div id="main-content">
    <div id="video-container">
        <button id="load-btn" onclick="manualPlay()">▶ 映像を再生</button>
        <video id="video-display" autoplay playsinline muted></video>
    </div>
    <div id="status-log">ログ: 待機中...</div>
    <div id="chat-section" style="height:120px; background:#fff; margin-top:5px; border-radius:10px; padding:5px; overflow-y:auto; font-size:12px;"></div>
    <div style="display:flex; padding:5px; gap:5px;">
        <input type="text" id="chat-input" style="flex:1; margin:0; padding:5px;" placeholder="チャット...">
        <button id="send-btn" style="padding:5px 15px;">送信</button>
    </div>
</div>

<script>
    const ADMIN_PASS = "pass"; 
    // IDの衝突を防ぐための接頭辞（これを付けることで他人のIDと被りにくくします）
    const ID_PREFIX = "MYAPP2026_";
    const CONFIG = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } };

    let peer, conn, currentStream, targetID;
    const logEl = document.getElementById('status-log');
    const videoEl = document.getElementById('video-display');

    function log(msg, color = "#0f0") {
        logEl.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    async function start(mode) {
        const rawID = document.getElementById('room-id-input').value.trim();
        if (!rawID) return alert("IDを入力してください");
        targetID = ID_PREFIX + rawID;

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';

        if (mode === 'admin') {
            if (document.getElementById('pass-input').value !== ADMIN_PASS) return location.reload();
            setupAdmin();
        } else {
            setupViewer();
        }
    }

    function setupAdmin() {
        navigator.mediaDevices.getDisplayMedia({ video: true, audio: true }).then(stream => {
            currentStream = stream;
            videoEl.srcObject = stream;
            peer = new Peer(targetID, CONFIG);
            peer.on('open', id => log("配信サーバーに登録完了。視聴者を待っています..."));
            peer.on('call', call => {
                log("映像要求あり。送信します。");
                call.answer(currentStream);
            });
            peer.on('connection', c => {
                conn = c;
                log("視聴者がチャットに接続しました。");
                conn.on('data', data => appendChat(data.user, data.msg));
            });
        }).catch(() => { alert("共有エラー"); location.reload(); });
    }

    function setupViewer() {
        log("ネットワーク初期化中...");
        peer = new Peer(CONFIG);
        peer.on('open', () => {
            log("配信者(" + targetID + ")を探しています...");
            
            // 接続試行
            conn = peer.connect(targetID);
            
            // 10秒経っても繋がらない場合の処理
            const failTimer = setTimeout(() => {
                if (!conn.open) {
                    log("【エラー】相手が見つかりません。原因：ID間違い、または配信者がまだ開始していません。", "red");
                }
            }, 10000);

            conn.on('open', () => {
                clearTimeout(failTimer);
                log("配信者に接続成功！映像を取得中...");
                const call = peer.call(targetID, new MediaStream());
                call.on('stream', stream => {
                    log("映像信号を確認。ボタンを押して再生してください。");
                    videoEl.srcObject = stream;
                    document.getElementById('load-btn').style.display = 'block';
                });
            });
        });
        peer.on('error', e => log("致命的エラー: " + e.type, "red"));
    }

    function manualPlay() {
        videoEl.muted = false;
        videoEl.play();
        document.getElementById('load-btn').style.display = 'none';
    }

    function appendChat(user, msg) {
        const div = document.createElement('div');
        div.innerHTML = `<b>${user}:</b> ${msg}`;
        document.getElementById('chat-section').appendChild(div);
    }

    document.getElementById('send-btn').onclick = () => {
        const msg = document.getElementById('chat-input').value;
        if (!msg || !conn) return;
        conn.send({ user: currentStream ? "管理者" : "視聴者", msg: msg });
        appendChat("自分", msg);
        document.getElementById('chat-input').value = "";
    };
</script>
</body>
</html>
