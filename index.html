<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Live Stream - Stable Sync</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 95vh; }
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align:center; }
        input { width: 90%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        #main-content { display: none; flex-direction: column; height: 100%; }
        #video-container { flex: 1; background: #000; position: relative; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #chat-section { height: 180px; display: flex; flex-direction: column; background: #fff; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; border-bottom: 1px solid #eee; }
        .status-badge { position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.7); padding: 4px 10px; border-radius: 15px; font-size: 11px; z-index: 10; }
        button { cursor: pointer; padding: 10px 15px; border-radius: 6px; border: none; background: #007bff; color: white; font-weight: bold; }
        .btn-view { background: #28a745; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h3>Live App</h3>
        <input type="password" id="pass-input" placeholder="パスワード(管理者のみ)">
        <input type="text" id="room-id-input" placeholder="配信ID (例: mylive777)">
        <button onclick="start('admin')" style="width:100%">管理者として開始</button>
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        <button onclick="start('viewer')" class="btn-view">視聴者として開始</button>
    </div>
</div>

<div id="main-content">
    <div id="video-container">
        <div id="status" class="status-badge">準備中...</div>
        <video id="video-display" autoplay playsinline controls></video>
    </div>
    <div id="chat-section">
        <div id="chat-box"></div>
        <div style="display:flex; padding:5px; gap:5px;">
            <input type="text" id="chat-input" style="flex:1; margin:0;" placeholder="メッセージ...">
            <button id="send-btn">送信</button>
        </div>
    </div>
    <div id="admin-controls" style="display:none; padding:10px; background:#fff; margin-top:5px; border-radius:10px;">
        <button onclick="toggleMic()" id="mic-btn">マイク: ON</button>
    </div>
</div>

<script>
    const ADMIN_PASS = "pass"; 
    const CONFIG = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } };
    let peer, conn, currentStream, targetRoomId;

    async function start(mode) {
        targetRoomId = document.getElementById('room-id-input').value;
        if (!targetRoomId) return alert("IDを入力してください");

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'flex';

        if (mode === 'admin') {
            if (document.getElementById('pass-input').value !== ADMIN_PASS) {
                alert("パスワード不正"); location.reload(); return;
            }
            document.getElementById('admin-controls').style.display = 'block';
            initAdmin();
        } else {
            initViewer();
        }
    }

    async function initAdmin() {
        try {
            currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            document.getElementById('video-display').srcObject = currentStream;
            document.getElementById('video-display').muted = true;

            peer = new Peer(targetRoomId, CONFIG);
            peer.on('open', id => document.getElementById('status').innerText = "配信中 ID: " + id);
            peer.on('call', call => {
                console.log("映像リクエストを受信");
                call.answer(currentStream);
            });
            peer.on('connection', c => {
                conn = c;
                conn.on('data', data => appendChat(data.user, data.msg));
                appendChat("システム", "視聴者が参加しました");
            });
        } catch (e) { alert("共有エラー"); location.reload(); }
    }

    function initViewer() {
        peer = new Peer(CONFIG);
        peer.on('open', () => {
            document.getElementById('status').innerText = "接続試行中...";
            
            // 少し遅らせてから接続（管理者の準備待ち）
            setTimeout(() => {
                // チャット接続
                conn = peer.connect(targetRoomId);
                conn.on('open', () => {
                    appendChat("システム", "配信に接続しました");
                    // 映像を要求
                    const call = peer.call(targetRoomId, new MediaStream());
                    call.on('stream', stream => {
                        const v = document.getElementById('video-display');
                        v.srcObject = stream;
                        v.play(); // 強制再生
                        document.getElementById('status').innerText = "ライブ視聴中";
                    });
                });
            }, 1000);
        });
    }

    function appendChat(user, msg) {
        const div = document.createElement('div');
        div.innerHTML = `<b>${user}:</b> ${msg}`;
        const box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('send-btn').onclick = () => {
        const msg = document.getElementById('chat-input').value;
        if (!msg || !conn) return;
        conn.send({ user: currentStream ? "管理者" : "視聴者", msg: msg });
        appendChat("自分", msg);
        document.getElementById('chat-input').value = "";
    };

    function toggleMic() {
        const audio = currentStream.getAudioTracks()[0];
        if (audio) { audio.enabled = !audio.enabled; document.getElementById('mic-btn').innerText = `マイク: ${audio.enabled ? "ON" : "OFF"}`; }
    }
</script>
</body>
</html>
