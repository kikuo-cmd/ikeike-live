<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Rebuild Live</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; }
        .box { border: 2px solid #444; border-radius: 15px; padding: 20px; margin-bottom: 20px; background: #111; }
        #video-screen { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 10px; margin-bottom: 10px; }
        video { width: 100%; height: 100%; border-radius: 10px; }
        .btn { width: 100%; padding: 20px; font-size: 20px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; margin: 10px 0; }
        .btn-host { background: #ff4757; color: white; }
        .btn-viewer { background: #2f3542; color: white; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 5px; border: none; box-sizing: border-box; font-size: 18px; }
        #monitor { background: #000; color: #0f0; padding: 15px; font-family: monospace; font-size: 14px; border: 1px solid #0f0; min-height: 100px; text-align: left; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="box">
        <h2>1. 接続設定</h2>
        <input type="text" id="appid-field" placeholder="Agora App IDを入力">
        <input type="text" id="channel-field" value="room1" placeholder="ルーム名">
    </div>

    <div class="box">
        <div id="video-screen">
            <video id="output-video" autoplay playsinline muted></video>
        </div>
        <div id="monitor">モニター: 準備完了。ボタンを押してください。</div>
    </div>

    <div class="box">
        <h2>2. 操作アクション</h2>
        <button class="btn btn-host" id="host-start-btn">🎥 配信を開始する</button>
        <button class="btn btn-viewer" id="viewer-start-btn">👀 視聴を開始する</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/agora-rtc-sdk-ng@latest/dist/agora-rtc-sdk-ng.js"></script>

    <script>
        const monitor = document.getElementById('monitor');
        const videoEl = document.getElementById('output-video');

        function print(msg) {
            const time = new Date().toLocaleTimeString();
            monitor.innerHTML += `<br>[${time}] ${msg}`;
            monitor.scrollTop = monitor.scrollHeight;
        }

        // ボタンのクリックイベントをJavaScript側から完全に制御
        document.getElementById('host-start-btn').onclick = () => start('host');
        document.getElementById('viewer-start-btn').onclick = () => start('audience');

        async function start(role) {
            const appid = document.getElementById('appid-field').value.trim();
            const channel = document.getElementById('channel-field').value.trim();

            if (!appid) {
                alert("App IDが空です！貼り付けてください。");
                return;
            }

            print(`アクション開始: ${role}モード`);

            try {
                // Agoraクライアントの作成
                const client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
                print("クライアント初期化成功");

                await client.setClientRole(role);
                print(`ロール設定完了: ${role}`);

                // サーバー参加
                await client.join(appid, channel, null, null);
                print("Agoraサーバーへ接続成功！");

                if (role === 'host') {
                    print("画面共有を起動します...");
                    const screenTrack = await AgoraRTC.createScreenVideoTrack();
                    const audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    print("画面と音声の取得に成功");

                    screenTrack.play('output-video');
                    await client.publish([screenTrack, audioTrack]);
                    print("🔴 配信がオンラインになりました");
                } else {
                    print("配信者を待機しています...");
                    client.on("user-published", async (user, mediaType) => {
                        print(`信号検知: ${mediaType}`);
                        await client.subscribe(user, mediaType);
                        if (mediaType === "video") {
                            print("映像受信中... 再生します");
                            user.videoTrack.play('output-video');
                        }
                        if (mediaType === "audio") {
                            user.audioTrack.play();
                        }
                    });
                }
            } catch (err) {
                print(`❌ エラー発生: ${err.message}`);
                console.error(err);
            }
        }
    </script>
</body>
</html>
