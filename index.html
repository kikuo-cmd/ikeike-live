<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Live Stream - Stable Version</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; height: 95vh; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        #main-content { display: none; flex-direction: column; height: 100%; }
        #video-container { flex: 1; background: #000; position: relative; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        #controls { padding: 15px; background: #fff; display: flex; gap: 10px; border-radius: 10px; margin-top: 10px; }
        #chat-section { height: 200px; display: flex; flex-direction: column; background: #fff; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; border-bottom: 1px solid #eee; }
        .status-badge { position: absolute; top: 15px; left: 15px; color: #fff; background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; font-size: 12px; z-index: 10; }
        button { cursor: pointer; padding: 10px 15px; border-radius: 6px; border: none; background: #007bff; color: white; font-weight: bold; }
        .btn-viewer { background: #6c757d; margin-top: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card">
        <h2>Live App</h2>
        <input type="password" id="pass-input" placeholder="管理者パスワード">
        <input type="text" id="room-id-input" placeholder="好きな配信ID (例: 1234)">
        <button onclick="startMode('admin')">管理者として配信開始</button>
        <hr>
        <button class="btn-viewer" onclick="startMode('viewer')">視聴者として参加</button>
    </div>
</div>

<div id="main-content">
    <div id="video-container">
        <div id="status" class="status-badge">準備中...</div>
        <video id="video-display" autoplay playsinline></video>
    </div>
    <div id="controls" id="admin-controls" style="display:none;">
        <button id="mic-btn">マイク: ON</button>
    </div>
    <div id="chat-section">
        <div id="chat-box"></div>
        <div style="display:flex; padding:5px;">
            <input type="text" id="chat-input" style="flex:1; margin:0; margin-right:5px;" placeholder="メッセージ...">
            <button id="send-btn">送信</button>
        </div>
    </div>
</div>

<script>
    const ADMIN_PASS = "pass"; // パスワード
    let peer, conn, currentStream;

    async function startMode(mode) {
        const pass = document.getElementById('pass-input').value;
        const roomId = document.getElementById('room-id-input').value;

        if (!roomId) return alert("配信ID（数字など）を決めて入力してください");

        if (mode === 'admin') {
            if (pass !== ADMIN_PASS) return alert("パスワードが違います");
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('controls').style.display = 'flex';
            setupAdmin(roomId);
        } else {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            setupViewer(roomId);
        }
    }

    // 管理者設定
    async function setupAdmin(id) {
        try {
            currentStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
            document.getElementById('video-display').srcObject = currentStream;
            document.getElementById('video-display').muted = true; // 自分の声がループしないように

            peer = new Peer(id); // 指定したIDで作成
            
            peer.on('open', () => {
                document.getElementById('status').innerText = "配信中 ID: " + id;
            });

            peer.on('error', (err) => {
                if(err.type === 'unavailable-id') alert("そのIDは既に使用されています。別のIDにしてください。");
                location.reload();
            });

            peer.on('call', (call) => {
                call.answer(currentStream);
            });

            peer.on('connection', (c) => {
                conn = c;
                conn.on('data', data => appendChat(data.user, data.msg));
            });
        } catch (e) {
            alert("画面共有に失敗しました");
            location.reload();
        }
    }

    // 視聴者設定
    function setupViewer(id) {
        peer = new Peer(); // 視聴者はランダムIDでOK
        
        peer.on('open', () => {
            document.getElementById('status').innerText = "接続中: ID " + id;
            
            // 映像を受け取る
            const call = peer.call(id, new MediaStream());
            call.on('stream', stream => {
                document.getElementById('video-display').srcObject = stream;
                document.getElementById('status').innerText = "ライブ視聴中";
            });

            // チャットを繋ぐ
            conn = peer.connect(id);
            conn.on('open', () => {
                conn.on('data', data => appendChat(data.user, data.msg));
            });
        });
    }

    function appendChat(user, msg) {
        const div = document.createElement('div');
        div.innerHTML = `<b>${user}:</b> ${msg}`;
        const box = document.getElementById('chat-box');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('send-btn').onclick = () => {
        const msg = document.getElementById('chat-input').value;
        if (!msg || !conn) return;
        conn.send({ user: currentStream ? "管理者" : "視聴者", msg: msg });
        appendChat("自分", msg);
        document.getElementById('chat-input').value = "";
    };

    document.getElementById('mic-btn').onclick = function() {
        const audio = currentStream.getAudioTracks()[0];
        if (audio) {
            audio.enabled = !audio.enabled;
            this.innerText = `マイク: ${audio.enabled ? "ON" : "OFF"}`;
        }
    };
</script>
</body>
</html>
